<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PORTAL KEHADIRAN SEEP 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --swk-yellow: #ffcd00;
            --swk-red: #e31b23;
            --swk-black: #000000;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --bg-dark: #0f1216;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Header Section */
        .main-header {
            width: 100%;
            height: 220px;
            background: url('https://i.ibb.co/VpC03Qkn/IMG-8705.png') no-repeat center center;
            background-size: cover;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom: 4px solid var(--swk-red);
        }

        .header-title {
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            text-align: center;
            backdrop-filter: blur(5px);
            border-radius: 10px;
        }

        .header-title h1 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--swk-yellow);
            letter-spacing: 2px;
        }

        .logo-container {
            width: 100px;
            height: 100px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 2px solid var(--glass-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -50px;
            position: relative;
            z-index: 10;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .logo-container img {
            width: 70px;
            height: auto;
        }

        /* Forms & Containers */
        .container {
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
            padding-bottom: 120px;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        input, select {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        /* Sarawak Button Style */
        .btn-login {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(45deg, var(--swk-red), var(--swk-yellow), var(--swk-black));
            background-size: 200% 200%;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.3s;
        }

        /* Attendance Buttons */
        .att-btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }

        .att-btn {
            padding: 12px 5px;
            border: none;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            opacity: 0.6;
        }

        .att-btn.active { opacity: 1; transform: scale(1.05); border: 2px solid white; }
        .bg-green { background-color: #28a745; }
        .bg-yellow { background-color: #ffc107; color: black; }
        .bg-red { background-color: #dc3545; }

        /* Student List */
        .student-row {
            padding: 15px;
            border-bottom: 1px solid var(--glass-border);
        }

        .student-row:last-child { border: none; }
        
        .student-name { font-weight: 600; font-size: 14px; margin-bottom: 5px; display: block; }
        .student-meta { font-size: 11px; opacity: 0.7; }

        /* Navigation Bottom Bar */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 18, 22, 0.95);
            backdrop-filter: blur(10px);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            padding: 15px 5px;
            border-top: 2px solid var(--swk-red);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: none;
            border: none;
            color: white;
            font-size: 10px;
            cursor: pointer;
        }

        .nav-item svg { width: 20px; height: 20px; margin-bottom: 5px; fill: currentColor; }
        .nav-item:active { color: var(--swk-yellow); }

        /* Dashboard */
        .dashboard-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            font-size: 12px;
        }

        .status-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            margin-left: 5px;
        }

        footer {
            text-align: center;
            font-size: 10px;
            opacity: 0.5;
            padding: 20px;
        }

        .hidden { display: none; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .view { animation: fadeIn 0.4s ease-in; }

    </style>
</head>
<body>

        <div id="view-dashboard" class="view hidden">

        <footer>

    <nav id="bottom-nav" class="bottom-nav hidden">
        <button class="nav-item" onclick="goBack()">

            "940129136671": { nama: "MOHD FARIDH REZZA BIN MOHD SABLI", subjek: ["BAHASA INGGERIS 2 AMETHYST"] },
            "940708126945": { nama: "MOHD. JAIEROL BIN JUMIN", subjek: ["MATEMATIK 1 RUBY", "MATEMATIK 2 AMETHYST"] },
            "861027526673": { nama: "NELSON ANAK GEORGE", subjek: ["SAINS 2 DIAMOND"] },
            "990507135656": { nama: "NORSYAZWANI BINT SALAINI", subjek: ["SAINS 1 DIAMOND"] },
            "971103085054": { nama: "NUR ATHIRAH BINTI MD NOR", subjek: ["MATEMATIK 4 AMETHYST"] },
            "970927036787": { nama: "MUHAMMAD BADRUL AMIN BIN AHMAD FUAD", subjek: ["MATEMATIK 1 AMETHYST"] },
            "00072130268": { nama: "NUR ELLYSHA BINTI NUR MUSWARIE", subjek: ["SAINS 1 RUBY", "SAINS 2 RUBY"] },
            "910204135752": { nama: "THANNIE BINTI BETTY", subjek: ["MATEMATIK 2 DIAMOND"] },
            "000627130838": { nama: "VANESSA ANAK PUTEH", subjek: ["ENGLISH 1 RUBY"] }
        };

        // --- DATABASE LINKS ---
        const csvLinks = {
            1: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQCbmoYUWEIQIYGLveu-q4TOsYjzT_1mq6w2-m_m0Q5e5G2Oy0G9dXVP3yxNHjY4qjZQ3LIKx9j2gvl/pub?gid=154786193&single=true&output=csv",
            2: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSi-4btpKwvSPukQGKHP0hKMHxxPfhbWgIcJGHdD2HjsvIjXuuFzAAuNL59R59sbMnocvfOv0KGuoNB/pub?output=csv",
            3: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRpl0emnND3D0WSm0n92Qj3rjVtI7L36FHOSZXhOBulRJslOGtD8yIgOw74hZfljlQ2HMwxf2jogl1-/pub?output=csv",
            4: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRoPGa6YjNCurNwaGTABEflsRqSactw6orXWR6w3AlIn-25LgczQxahCu7rPRVlnKbQWndUz0rdtKAy/pub?output=csv",
            5: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQPx_Vym9O7mQejaGpkZjLEeTtu5sGxB36NRnPhc88YPAA0JyW64m5gg8XdEPi67QQul-jkUpv-Vczj/pub?output=csv"
        };

        const gasLinks = {
            1: "https://script.google.com/macros/s/AKfycbwltfX7rBOSowNuAjqGqfAE19wewRE9rSg7Xe0Jdf_fAsrlMKEmHpBCVD01xO-fV-nE/exec",
            2: "https://script.google.com/macros/s/AKfycbzHFtf4FgmUrtg4NNCi0libpnhOHCk2TnBI-RX_dvNb8fu7jkXoVgVrjSwcrpoFylvK/exec",
            3: "https://script.google.com/macros/s/AKfycbxbJSaw6tWZjnCGSexUBp2X_yCYAu-sCpoDe1aGcqDJ13w9NOJvD4ac6f18SWlARWkh/exec",
            4: "https://script.google.com/macros/s/AKfycbwUlfU0Sv7N20kANe05v3l1LF8I2fgGkF0RHpakDfFFcY_rug3lu1ay5OArSsMElmivQg/exec",
            5: "https://script.google.com/macros/s/AKfycbxtRvCTS_E2VaOqSC3Ay0EUB201PP3GX_KY66CLNk4FHV1ACPvbEcCtXAj5nNgNMxZf/exec"
        };

        const sesiKolum = {
            1: "E", 2: "F", 3: "G", 4: "H", 5: "I", 6: "J", 7: "K", 8: "L", 
            9: "M", 10: "N", 11: "O", 12: "P", 13: "Q", 14: "R", 15: "S", 16: "T", 17: "U", 18: "V"
        };

        // --- APP STATE ---
        let currentGuru = null;
        let activeSubjek = "";
        let activeSesi = "";
        let currentTingkatan = 0;
        let attendanceRecord = {};

        // --- LOGIC ---

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
            
            if (viewId === 'view-login') {
                document.getElementById('bottom-nav').classList.add('hidden');
            } else {
                document.getElementById('bottom-nav').classList.remove('hidden');
            }
        }

        function loginGuru() {
            const ic = document.getElementById('guru-ic').value;
            if (guruData[ic]) {
                currentGuru = guruData[ic];
                document.getElementById('display-guru-name').innerText = "Selamat Datang, " + currentGuru.nama;
                
                const select = document.getElementById('select-subjek');
                select.innerHTML = "";
                currentGuru.subjek.forEach(s => {
                    let opt = document.createElement('option');
                    opt.value = s;
                    opt.innerText = s;
                    select.appendChild(opt);
                });

                showView('view-selection');
            } else {
                alert("ID Guru tidak dijumpai!");
            }
        }

        async function loadPelajar() {
            activeSubjek = document.getElementById('select-subjek').value;
            activeSesi = document.getElementById('select-sesi').value;
            
            // Cari tingkatan dari nama subjek
            const match = activeSubjek.match(/\d+/);
            currentTingkatan = match ? parseInt(match[0]) : 1;

            document.getElementById('display-info-kelas').innerText = `${activeSubjek} - SESI ${activeSesi}`;
            
            const container = document.getElementById('student-list-container');
            container.innerHTML = "<p style='text-align:center'>Memuatkan senarai pelajar...</p>";
            
            try {
                const response = await fetch(csvLinks[currentTingkatan]);
                const data = await response.text();
                const rows = data.split('\n').map(row => row.split(','));
                
                // Rows: 0=Nama, 1=Kelas, 2=Jantina, 3=Subjek/Kumpul
                const filtered = rows.filter(row => row[3] && row[3].trim().toUpperCase() === activeSubjek.toUpperCase());

                if (filtered.length === 0) {
                    container.innerHTML = "<p style='text-align:center'>Tiada pelajar dijumpai untuk kumpulan ini.</p>";
                    return;
                }

                container.innerHTML = "";
                attendanceRecord = {};

                filtered.forEach((p, index) => {
                    const nama = p[0].trim();
                    const kelas = p[1].trim();
                    const jantina = p[2].trim();
                    
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'student-row';
                    rowDiv.innerHTML = `
                        <span class="student-name">${nama}</span>
                        <span class="student-meta">${kelas} | ${jantina}</span>
                        <div class="att-btn-group" id="group-${index}">
                            <button class="att-btn bg-green" onclick="markAttendance(${index}, '${nama}', 'Hadir')">HADIR</button>
                            <button class="att-btn bg-yellow" onclick="markAttendance(${index}, '${nama}', 'TH Bersebab')">BERSEBAB</button>
                            <button class="att-btn bg-red" onclick="markAttendance(${index}, '${nama}', 'TH Tanpa Sebab')">TANPA SEBAB</button>
                        </div>
                    `;
                    container.appendChild(rowDiv);
                });

                showView('view-attendance');

            } catch (err) {
                alert("Gagal memuatkan data pelajar: " + err);
            }
        }

        function markAttendance(idx, nama, status) {
            attendanceRecord[nama] = status;
            
            // Update UI
            const btnGroup = document.getElementById(`group-${idx}`);
            btnGroup.querySelectorAll('.att-btn').forEach(btn => btn.classList.remove('active'));
            
            const selectedBtn = Array.from(btnGroup.querySelectorAll('.att-btn')).find(b => b.innerText.includes(status.toUpperCase().replace('TH ', '')));
            if(selectedBtn) selectedBtn.classList.add('active');

            // Auto-focus logic (Simulasi Enter)
            const nextGroup = document.getElementById(`group-${idx + 1}`);
            if (nextGroup) {
                nextGroup.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function simpanHantar() {
            const listPelajar = Object.keys(attendanceRecord);
            if (listPelajar.length === 0) {
                alert("Sila tandakan sekurang-kurangnya satu kehadiran.");
                return;
            }

            const tarikh = new Date().toLocaleDateString('ms-MY');
            const dataUntukSimpan = {
                id: Date.now(),
                guru: currentGuru.nama,
                subjek: activeSubjek,
                sesi: activeSesi,
                tingkatan: currentTingkatan,
                tarikh: tarikh,
                rekod: attendanceRecord
            };

            // 1. Simpan ke LocalStorage
            let localData = JSON.parse(localStorage.getItem('seep_records') || "[]");
            localData.push(dataUntukSimpan);
            localStorage.setItem('seep_records', JSON.stringify(localData));

            // 2. Hantar ke Google Sheet
            const url = gasLinks[currentTingkatan];
            const kolum = sesiKolum[activeSesi];

            alert("Menghantar rekod ke pangkalan data Master...");

            // Iterasi untuk hantar setiap pelajar (Bergantung pada struktur GAS anda)
            // Di sini kita hantar sebagai batch atau satu-satu
            Promise.all(listPelajar.map(nama => {
                return fetch(url, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: new URLSearchParams({
                        'nama': nama,
                        'status': attendanceRecord[nama],
                        'kolum': kolum,
                        'subjek': activeSubjek
                    })
                });
            })).then(() => {
                alert("Berjaya dihantar ke Google Sheets!");
                viewDashboard();
            }).catch(e => alert("Ralat penghantaran: " + e));
        }

        function viewDashboard() {
            showView('view-dashboard');
            const list = document.getElementById('dashboard-list');
            const localData = JSON.parse(localStorage.getItem('seep_records') || "[]");

            if (localData.length === 0) {
                list.innerHTML = "<p style='text-align:center'>Tiada rekod disimpan.</p>";
                return;
            }

            list.innerHTML = "";
            localData.sort((a,b) => b.id - a.id).forEach(item => {
                const div = document.createElement('div');
                div.className = 'dashboard-item';
                div.innerHTML = `
                    <strong>${item.subjek} - Sesi ${item.sesi}</strong><br>
                    Tarikh: ${item.tarikh}<br>
                    <div style="margin-top:10px;">
                        <button onclick="hapusRekod(${item.id})" style="background:red; color:white; border:none; padding:5px 10px; border-radius:5px; font-size:10px;">Hapus</button>
                        <button onclick="editRekod(${item.id})" style="background:blue; color:white; border:none; padding:5px 10px; border-radius:5px; font-size:10px; margin-left:5px;">Kemaskini</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function hapusRekod(id) {
            if (!confirm("Padam rekod ini dari local dan pangkalan data?")) return;
            
            let localData = JSON.parse(localStorage.getItem('seep_records') || "[]");
            const item = localData.find(d => d.id === id);
            
            if (item) {
                // Hantar request 'Hapus' ke GAS (mengosongkan data)
                const url = gasLinks[item.tingkatan];
                const kolum = sesiKolum[item.sesi];
                
                Object.keys(item.rekod).forEach(nama => {
                    fetch(url, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: new URLSearchParams({
                            'nama': nama,
                            'status': '', // Kosongkan
                            'kolum': kolum,
                            'subjek': item.subjek
                        })
                    });
                });
            }

            localData = localData.filter(d => d.id !== id);
            localStorage.setItem('seep_records', JSON.stringify(localData));
            viewDashboard();
        }

        function editRekod(id) {
            const localData = JSON.parse(localStorage.getItem('seep_records') || "[]");
            const item = localData.find(d => d.id === id);
            if (item) {
                activeSubjek = item.subjek;
                activeSesi = item.sesi;
                currentTingkatan = item.tingkatan;
                loadPelajar().then(() => {
                    // Pre-fill attendance
                    attendanceRecord = item.rekod;
                    // (Logik tambahan untuk setkan class .active pada butang)
                });
            }
        }

        function goBack() {
            if (!document.getElementById('view-attendance').classList.contains('hidden')) {
                showView('view-selection');
            } else if (!document.getElementById('view-dashboard').classList.contains('hidden')) {
                showView('view-selection');
            } else {
                showView('view-login');
            }
        }

        function logout() {
            if(confirm("Adakah anda pasti mahu keluar?")) {
                currentGuru = null;
                showView('view-login');
            }
        }

        // Support mobile keyboard "Enter"
        document.addEventListener('keydown', function(e) {
            if(e.key === "Enter") {
                // Enter biasanya digunakan untuk lompat fokus pada mobile
                // Logic markAttendance sudah menyertakan auto-scroll
            }
        });

    </script>
</body>
</html>
