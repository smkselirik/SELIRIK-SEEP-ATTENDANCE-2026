<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTAL KEHADIRAN SEEP 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121212;
            --card-dark: #1e1e1e;
            --text-light: #e0e0e0;
            --swk-yellow: #FCD116;
            --swk-red: #CE1126;
            --swk-black: #000000;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --btn-hadir: #28a745;
            --btn-sebab: #ffc107;
            --btn-tanpa-sebab: #dc3545;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: 90px;
        }

        /* Header Responsive - Memenuhi Ruang */
        .header-banner {
            width: 100%;
            border-bottom: 3px solid var(--swk-yellow);
            line-height: 0;
            overflow: hidden;
        }

        .header-banner img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -45px;
            z-index: 10;
            position: relative;
        }

        .glass-placard {
            width: 90px;
            height: 90px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 50%;
            padding: 10px;
            border: 2px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .glass-placard img { width: 85%; height: 85%; object-fit: contain; }

        .portal-title { text-align: center; margin-top: 10px; }
        .portal-title h1 { font-size: 1.3rem; margin: 0; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .portal-title h2 { font-size: 1rem; margin: 3px 0 0 0; color: var(--swk-yellow); }

        .container { padding: 15px; max-width: 600px; margin: 0 auto; width: 100%; box-sizing: border-box; }

        .card {
            background-color: var(--card-dark);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
        }

        label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #aaa; }
        input, select {
            width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #444;
            border-radius: 8px; background-color: #2a2a2a; color: #fff; font-size: 1rem; box-sizing: border-box;
        }

        .btn {
            padding: 14px; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s; text-align: center; display: inline-block; width: 100%; margin-bottom: 10px;
        }

        .btn-sarawak {
            background: linear-gradient(135deg, var(--swk-yellow) 33%, var(--swk-red) 33%, var(--swk-red) 66%, var(--swk-black) 66%);
            color: white; border: 1px solid #fff;
        }
        
        .btn-primary { background-color: #007bff; color: white; }
        .btn-success { background-color: #28a745; color: white; }
        .btn-info { background-color: #17a2b8; color: white; }
        .btn-warning { background-color: #ffc107; color: black; }
        .btn-danger { background-color: #dc3545; color: white; }
        .btn-secondary { background-color: #6c757d; color: white; }

        /* Attendance Styles */
        .student-item { padding: 15px 0; border-bottom: 1px solid #333; }
        .student-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 10px; color: #fff; }
        .attendance-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn-att { padding: 12px 5px; font-size: 0.75rem; border-radius: 6px; border: 2px solid transparent; color: white; font-weight: 600; background: #333; }
        .btn-att.hadir { background: var(--btn-hadir); }
        .btn-att.sebab { background: var(--btn-sebab); color: #000; }
        .btn-att.tanpa-sebab { background: var(--btn-tanpa-sebab); }
        .btn-att.selected { border-color: white; transform: scale(1.03); box-shadow: 0 0 10px rgba(255,255,255,0.2); opacity: 1; }
        .btn-att:not(.selected) { opacity: 0.5; }

        /* Fixed Bottom Bar */
        .fixed-bottom-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #1a1a1a; padding: 10px; display: flex; gap: 8px;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.6); z-index: 1000; box-sizing: border-box;
        }
        .fixed-bottom-bar .btn { margin-bottom: 0; padding: 12px 5px; font-size: 0.75rem; flex: 1; }

        /* Dashboard Styles */
        .record-item { background: #2a2a2a; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid var(--swk-yellow); }
        .student-detail-list { margin-top: 10px; padding: 10px; background: #1e1e1e; border-radius: 6px; font-size: 0.8rem; max-height: 200px; overflow-y: auto; }
        .detail-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dashed #444; }
        .hidden { display: none !important; }
        .loader { text-align: center; padding: 20px; color: var(--swk-yellow); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-banner">
        <img src="https://i.ibb.co/JjrcP5G0/Social-Studies-Google-Classroom-Header-in-Dark-Red-and-Yellow-Illustrative-Style.png" alt="Header">
    </div>
    <div class="logo-container">
        <div class="glass-placard"><img src="https://i.ibb.co/VYSKMXf1/Logo-Selirik.png" alt="Logo"></div>
        <div class="portal-title"><h1>PORTAL KEHADIRAN SEEP</h1><h2>Sesi 2026</h2></div>
    </div>

    <div class="container">
        <div id="section-login" class="card">
            <h3 style="text-align: center; margin-top:0;">Log Masuk Guru</h3>
            <input type="number" id="ic-input" placeholder="No. IC Tanpa Sempang" onkeypress="if(event.key==='Enter')login()">
            <button class="btn btn-sarawak" onclick="login()">LOG MASUK</button>
        </div>

        <div id="section-selection" class="card hidden">
            <h3 id="teacher-name-display" style="color:var(--swk-yellow); margin-top:0;">-</h3>
            
            <label>Pilih Kelas & Subjek</label>
            <select id="select-subject">
                <option value="">-- Sila Pilih --</option>
            </select>

            <label>Pilih Sesi</label>
            <select id="select-session">
                <script>for(let i=1; i<=18; i++) document.write(`<option value="${i}">Sesi ${i}</option>`);</script>
            </select>

            <button class="btn btn-primary" onclick="loadStudents()">MULA KEMASUKAN</button>
            <button class="btn btn-warning" onclick="semakRekodMaster()">SEMAK REKOD MASTER (LIVE)</button>
        </div>

        <div id="section-attendance" class="hidden">
            <div id="loader" class="loader hidden">Memuatkan Data...</div>
            <div class="card">
                <h3 id="attendance-title" style="margin-top:0; border-bottom:1px solid #444; padding-bottom:10px;">Senarai Pelajar</h3>
                <div id="student-list"></div>
            </div>
        </div>

        <div id="section-dashboard" class="hidden">
            <div class="card">
                <h3 style="margin-top:0; color:var(--swk-yellow);">Rekod Kehadiran</h3>
                <div id="dashboard-list"></div>
            </div>
        </div>
    </div>

    <div id="bar-selection" class="fixed-bottom-bar hidden">
        <button class="btn btn-info" onclick="bukaDashboard()">Rekod Tempatan</button>
        <button class="btn btn-danger" onclick="logout()">Log Keluar</button>
    </div>

    <div id="bar-attendance" class="fixed-bottom-bar hidden">
        <button class="btn btn-success" onclick="simpanDanHantar()">Simpan & Hantar</button>
        <button class="btn btn-secondary" onclick="showSection('section-selection')">Kembali</button>
    </div>

    <div id="bar-dashboard" class="fixed-bottom-bar hidden">
        <button class="btn btn-primary" onclick="showSection('section-selection')">Menu Utama</button>
        <button class="btn btn-danger" onclick="logout()">Log Keluar</button>
    </div>

    <script>
        const teachersData = {

            "980627135299": { name: "DARREN GILBERT ANAK KOH", subjects: ["ENGLISH 3 RUBY", "ENGLISH 5 SAPPHIRE"] },
            "860805526983": { name: "GRAY ANAK JOWIM@JOWIN", subjects: ["SEJARAH 4 DIAMOND", "SEJARAH 5 AMETHYST"] },

            "800718135867": { name: "KONG CHUNG SHING", subjects: ["SAINS 4 DIAMOND"] },
            "861122135080": { name: "ALEXANRA ANAK ANDREW KANA", subjects: ["ADDITIONAL MATHEMATICS 4 JADEITE", "MATEMATIK 5 JADEITE", "MATEMATIK 5 AMETYST"] },

            "970825016670": { name: "BRENDA AIMA ANAK JOSHUA MARIYAM", subjects: ["BIOLOGY 4 JADEITE", "SAINS 3 AMETHYST"] },
            "920317036207": { name: "CHE MOHD UDAIY BIN CHE ABDUL HADI", subjects: ["PHYSICS 4 JADEITE", "SAINS 3 RUBY"] },
            "840607135430": { name: "DIANA ANAK LIMBI", subjects: ["SAINS 4 RUBY", "SAINS 5 AMETHYST"] },
            "010227130467": { name: "GONZALES ANAK ABING", subjects: ["MATEMATIK 4 JADEITE", "MATEMATIK 5 SAPPHIRE"] },
            "940628135710": { name: "JACINTA ANAK BUDIT", subjects: ["PHYSICS 5 JADEITE", "SAINS 5 DIAMOND"] },
            "980605135925": { name: "JACKSON LEO ANAK SEBA", subjects: ["SEJARAH 5 SAPPHIRE"] },
            "990427135576": { name: "LORRAINNA SIERRA ANAK MEGONG", subjects: ["ENGLISH 3 AMETHYST"] },
            "950905036147": { name: "MUHAMMAD HANIF IQWAN BIN ABD AZIZ", subjects: ["MATEMATIK 3 DIAMOND"] },
            "780502135387": { name: "AWIN ANAK ENGGA", subjects: ["MATEMATIK 3 AMETHYST"] },
            "960408135290": { name: "NURSYAMIERA BINTI MAJAIE", subjects: ["MATEMATIK 3 RUBY", "MATEMATIK 4 RUBY"] },
            "930403135198": { name: "NURUL SAMIZA BT ABANG", subjects: ["MATEMATIK 4 DIAMOND", "MATEMATIK 5 EMERALD"] },
            "940318135694": { name: "SIA KANG YEE", subjects: ["CHEMISTRY 4 JADEITE", "CHEMISTRY 5 JADEITE"] },
            "960830125354": { name: "SITI NOR LIYANA BINTI MOHD TASRIB", subjects: ["SAINS 3 DIAMOND"] },
            "910306135868": { name: "STEPHANIE ANAK JUKY", subjects: ["BIOLOGY 5 JADEITE", "SAINS 5 RUBY"] },
            "730417055045": { name: "WONG CHEE LOONG", subjects: ["ADDITIONAL MATHEMATICS 5 JADEITE", "MATEMATIK 5 RUBY"] },
            "790603135182": { name: "CATHERINE TING LEH MEE", subjects: ["SAINS 1 AMETHYST"] },
            "900217135285": { name: "AUDIE PETER ANAK JOACHIM", subjects: ["ENGLISH 1 AMETHYST", "ENGLISH 2 DIAMOND"] },
            "960820126054": { name: "BELLA ALFEYANA BOBBY", subjects: ["ENGLISH 2 RUBY"] },
            "960707136410": { name: "CHRISTINA GADING ANAK MERING", subjects: ["ENGLISH 1 DIAMOND"] },
            "921011135725": { name: "FRANKLIN ANAK BALA", subjects: ["SAINS 2 AMETHYST"] },
            "961202135572": { name: "MELISSA BINTI MANDE", subjects: ["MATEMATIK 1 DIAMOND", "MATEMATIK 2 RUBY"] },
            "940129136671": { name: "MOHD FARIDH REZZA BIN MOHD SABLI", subjects: ["BAHASA INGGERIS 2 AMETHYST"] },
            "940708126945": { name: "MOHD. JAIEROL BIN JUMIN", subjects: ["MATEMATIK 1 RUBY", "MATEMATIK 2 AMETHYST"] },
            "861027526673": { name: "NELSON ANAK GEORGE", subjects: ["SAINS 2 DIAMOND"] },
            "990507135656": { name: "NORSYAZWANI BINT SALAINI", subjects: ["SAINS 1 DIAMOND"] },
            "971103085054": { name: "NUR ATHIRAH BINTI MD NOR", subjects: ["MATEMATIK 4 AMETHYST"] },
            "970927036787": { name: "MUHAMMAD BADRUL AMIN BIN AHMAD FUAD", subjects: ["MATHEMATICS 1 AMETHYST"] },
            "00072130268":  { name: "NUR ELLYSHA BINTI NUR MUSWARIE", subjects: ["SAINS 1 RUBY", "SAINS 2 RUBY"] },
            "910204135752": { name: "THANNIE BINTI BETTY", subjects: ["MATEMATIK 2 DIAMOND"] },
            "000627130838": { name: "VANESSA ANAK PUTEH", subjects: ["ENGLISH 1 RUBY"] }
        };

        const csvLinks = {
            "1": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQCbmoYUWEIQIYGLveu-q4TOsYjzT_1mq6w2-m_m0Q5e5G2Oy0G9dXVP3yxNHjY4qjZQ3LIKx9j2gvl/pub?gid=154786193&single=true&output=csv",
            "2": "https://docs.google.com/spreadsheets/d/e/2PACX-1vSi-4btpKwvSPukQGKHP0hKMHxxPfhbWgIcJGHdD2HjsvIjXuuFzAAuNL59R59sbMnocvfOv0KGuoNB/pub?output=csv",
            "3": "https://docs.google.com/spreadsheets/d/e/2PACX-1vRpl0emnND3D0WSm0n92Qj3rjVtI7L36FHOSZXhOBulRJslOGtD8yIgOw74hZfljlQ2HMwxf2jogl1-/pub?output=csv",
            "4": "https://docs.google.com/spreadsheets/d/e/2PACX-1vRoPGa6YjNCurNwaGTABEflsRqSactw6orXWR6w3AlIn-25LgczQxahCu7rPRVlnKbQWndUz0rdtKAy/pub?output=csv",
            "5": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQPx_Vym9O7mQejaGpkZjLEeTtu5sGxB36NRnPhc88YPAA0JyW64m5gg8XdEPi67QQul-jkUpv-Vczj/pub?output=csv"
        };

        const appScriptLinks = {
            "1": "https://script.google.com/macros/s/AKfycbwltfX7rBOSowNuAjqGqfAE19wewRE9rSg7Xe0Jdf_fAsrlMKEmHpBCVD01xO-fV-nE/exec",
            "2": "https://script.google.com/macros/s/AKfycbzHFtf4FgmUrtg4NNCi0libpnhOHCk2TnBI-RX_dvNb8fu7jkXoVgVrjSwcrpoFylvK/exec",
            "3": "https://script.google.com/macros/s/AKfycbxbJSaw6tWZjnCGSexUBp2X_yCYAu-sCpoDe1aGcqDJ13w9NOJvD4ac6f18SWlARWkh/exec",
            "4": "https://script.google.com/macros/s/AKfycbwUlfU0Sv7N20kANe05v3l1LF8I2fgGkF0RHpakDfFFcY_rug3lu1ay5OArSsMElmivQg/exec",
            "5": "https://script.google.com/macros/s/AKfycbxtRvCTS_E2VaOqSC3Ay0EUB201PP3GX_KY66CLNk4FHV1ACPvbEcCtXAj5nNgNMxZf/exec"
        };

        let currentTeacher = null;
        let currentStudents = [];
        let currentAttendance = {};

        function showSection(id) {
            document.querySelectorAll('.container > div, .fixed-bottom-bar').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'section-selection') document.getElementById('bar-selection').classList.remove('hidden');
            if(id === 'section-attendance') document.getElementById('bar-attendance').classList.remove('hidden');
            if(id === 'section-dashboard') document.getElementById('bar-dashboard').classList.remove('hidden');
        }

        function login() {
            let ic = document.getElementById('ic-input').value.trim();
            if(ic === "72130268") ic = "00072130268";
            if(ic === "627130838") ic = "000627130838";

            if (teachersData[ic]) {
                currentTeacher = teachersData[ic];
                document.getElementById('teacher-name-display').innerText = `Cikgu ${currentTeacher.name}`;
                let subSelect = document.getElementById('select-subject');
                subSelect.innerHTML = '<option value="">-- Pilih Kelas --</option>';
                currentTeacher.subjects.forEach(s => subSelect.innerHTML += `<option value="${s}">${s}</option>`);
                showSection('section-selection');
            } else {
                alert("IC tidak ditemui!");
            }
        }

        function getFormFromSubject(subject) {
            let match = subject.match(/\d/);
            return match ? match[0] : null;
        }

        async function loadStudents() {
            let subject = document.getElementById('select-subject').value;
            let session = document.getElementById('select-session').value;
            let form = getFormFromSubject(subject);

            if(!subject || !session) return alert("Sila pilih kelas & sesi.");

            showSection('section-attendance');
            document.getElementById('student-list').innerHTML = '';
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('attendance-title').innerText = `${subject} (Sesi ${session})`;

            try {
                let res = await fetch(csvLinks[form]);
                let text = await res.text();
                let rows = text.split('\n');
                currentStudents = [];
                currentAttendance = {};

                for(let i=1; i<rows.length; i++) {
                    let cols = rows[i].split(',');
                    if(cols.length >= 4 && (subject.includes(cols[3].trim()) || cols[3].trim().includes(subject))) {
                        currentStudents.push({ name: cols[0].trim(), className: cols[1].trim(), id: i });
                        currentAttendance[i] = "";
                    }
                }
                renderList();
            } catch(e) { alert("Ralat muat turun data."); }
            finally { document.getElementById('loader').classList.add('hidden'); }
        }

        function renderList() {
            let container = document.getElementById('student-list');
            container.innerHTML = currentStudents.length ? '' : '<p>Tiada pelajar.</p>';
            currentStudents.forEach((s, idx) => {
                let div = document.createElement('div');
                div.className = 'student-item';
                div.innerHTML = `
                    <div class="student-name">${idx+1}. ${s.name}</div>
                    <div class="attendance-actions">
                        <button class="btn-att hadir ${currentAttendance[s.id]==='Hadir'?'selected':''}" onclick="mark(${s.id},'Hadir')">Hadir</button>
                        <button class="btn-att sebab ${currentAttendance[s.id]==='Tidak Hadir Bersebab'?'selected':''}" onclick="mark(${s.id},'Tidak Hadir Bersebab')">Bersebab</button>
                        <button class="btn-att tanpa-sebab ${currentAttendance[s.id]==='Tidak Hadir Tanpa Sebab'?'selected':''}" onclick="mark(${s.id},'Tidak Hadir Tanpa Sebab')">T.Sebab</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function mark(id, status) {
            currentAttendance[id] = status;
            renderList();
        }

        async function semakRekodMaster() {
            let subject = document.getElementById('select-subject').value;
            let form = getFormFromSubject(subject);
            if(!subject) return alert("Sila pilih subjek dahulu.");

            alert("Menarik data terus dari Google Sheet Master. Sila tunggu...");
            showSection('section-dashboard');
            document.getElementById('dashboard-list').innerHTML = '<div class="loader">Menghubungi Master Sheet...</div>';

            try {
                // Menghantar permintaan ke App Script untuk mendapatkan data live
                let res = await fetch(`${appScriptLinks[form]}?action=get_master_history&subject=${encodeURIComponent(subject)}`);
                let data = await res.json();
                
                let container = document.getElementById('dashboard-list');
                container.innerHTML = '';

                if(!data || data.length === 0) {
                    container.innerHTML = '<p style="text-align:center;">Tiada rekod ditemui di Master Sheet untuk subjek ini.</p>';
                    return;
                }

                data.forEach(rec => {
                    let div = document.createElement('div');
                    div.className = 'record-item';
                    div.innerHTML = `
                        <div style="font-weight:bold; color:var(--swk-yellow);">Sesi ${rec.session}</div>
                        <div style="font-size:0.8rem; margin-bottom:10px;">Dikemaskini: ${rec.timestamp}</div>
                        <button class="btn btn-info" style="padding:5px; font-size:0.7rem;" onclick="this.nextElementSibling.classList.toggle('hidden')">Lihat Senarai</button>
                        <div class="student-detail-list hidden">
                            ${rec.details.map(d => `<div class="detail-row"><span>${d.name}</span><b>${d.status}</b></div>`).join('')}
                        </div>
                    `;
                    container.appendChild(div);
                });
            } catch(e) {
                document.getElementById('dashboard-list').innerHTML = '<p style="color:red;">Ralat: Pastikan App Script anda telah menyokong fungsi "get_master_history".</p>';
            }
        }

        async function simpanDanHantar() {
            let subject = document.getElementById('select-subject').value;
            let session = document.getElementById('select-session').value;
            let form = getFormFromSubject(subject);
            
            let dataToSent = currentStudents.map(s => ({
                name: s.name,
                className: s.className,
                status: currentAttendance[s.id] || "Tiada Rekod"
            }));

            alert("Menghantar ke Google Sheet...");
            try {
                await fetch(appScriptLinks[form], {
                    method: 'POST', mode: 'no-cors',
                    body: JSON.stringify({ action: 'update_attendance', session, subject, records: dataToSent })
                });
                
                // Simpan local juga sebagai backup
                let localRecords = JSON.parse(localStorage.getItem('seep_records') || '[]');
                localRecords.push({ id: Date.now(), teacher: currentTeacher.name, subject, session, date: new Date().toLocaleString(), data: dataToSent });
                localStorage.setItem('seep_records', JSON.stringify(localRecords));

                alert("BERJAYA DIHANTAR!");
                showSection('section-selection');
            } catch(e) { alert("Gagal hantar ke server, tetapi disimpan dalam peranti."); }
        }

        function bukaDashboard() {
            showSection('section-dashboard');
            let container = document.getElementById('dashboard-list');
            container.innerHTML = '';
            let records = JSON.parse(localStorage.getItem('seep_records') || '[]').filter(r => r.teacher === currentTeacher.name);
            
            records.reverse().forEach(r => {
                container.innerHTML += `
                    <div class="record-item">
                        <b>${r.subject} - Sesi ${r.session}</b><br><small>${r.date}</small>
                        <button class="btn btn-info" style="margin-top:10px; padding:5px;" onclick="this.nextElementSibling.classList.toggle('hidden')">Lihat Senarai</button>
                        <div class="student-detail-list hidden">
                            ${r.data.map(d => `<div class="detail-row"><span>${d.name}</span><b>${d.status}</b></div>`).join('')}
                        </div>
                    </div>`;
            });
        }

        function logout() { currentTeacher = null; showSection('section-login'); }
    </script>
</body>
</html>
