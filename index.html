<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PORTAL KEHADIRAN SEEP 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --swk-yellow: #fcd116;
            --swk-red: #ce1126;
            --swk-black: #000000;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --bg-dark: #121212;
            --text-light: #f1f1f1;
        }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0; padding: 0;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        /* --- HEADER & LOGO --- */
        .main-header {
            width: 100%;
            margin: 0; 
            padding: 0;
            display: block;
        }
        .main-header img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        .logo-container {
            width: 100px; height: 100px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: -50px auto 10px auto; /* Bertindih sedikit dengan header */
            position: relative; z-index: 10;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .logo-container img { width: 70px; height: auto; }

        .portal-title {
            text-align: center;
            margin-bottom: 20px;
            padding: 0 15px;
        }
        .portal-title h1 { margin: 0; font-size: 1.3rem; color: var(--swk-yellow); letter-spacing: 1px; }
        .portal-title p { margin: 0; font-size: 0.9rem; color: white; }

        .container { padding: 0 15px 15px 15px; max-width: 600px; margin: 0 auto; }

        /* --- GLASS CARD --- */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 20px; margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* --- INPUTS & SELECTS --- */
        input, select {
            width: 100%; padding: 14px; margin: 10px 0 20px 0; border-radius: 10px;
            border: 1px solid var(--glass-border); background: rgba(0,0,0,0.5);
            color: white; font-size: 15px; outline: none;
        }

        /* --- SARAWAK BUTTON --- */
        .btn-sarawak {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            background-color: var(--swk-yellow);
            color: var(--swk-black);
            font-weight: 800; font-size: 16px; text-transform: uppercase; letter-spacing: 1px;
            border-top: 6px solid var(--swk-black);
            border-bottom: 6px solid var(--swk-red);
            box-shadow: 0 8px 32px rgba(255, 255, 255, 0.1);
            cursor: pointer; transition: transform 0.1s;
        }
        .btn-sarawak:active { transform: scale(0.97); }

        .btn-general {
            width: 100%; padding: 14px; border-radius: 10px; border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.1); color: white; font-weight: 600; cursor: pointer; margin-top: 10px;
        }

        /* --- ATTENDANCE LIST --- */
        .student-row { padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1); transition: background 0.3s; }
        .student-row.highlight { background: rgba(255,255,255,0.05); }
        .student-info { font-weight: 600; font-size: 14px; color: var(--swk-yellow); margin-bottom: 8px; display: block; }
        .student-meta { font-size: 11px; color: #aaa; display: block; margin-bottom: 8px; }
        
        .att-btn-group { display: flex; gap: 5px; }
        .att-btn {
            flex: 1; padding: 12px 5px; border: 1px solid transparent; border-radius: 8px;
            font-size: 11px; font-weight: 600; color: white; cursor: pointer; opacity: 0.4; transition: 0.2s;
        }
        .att-btn.active { opacity: 1; transform: scale(1.05); border: 2px solid white; font-weight: 800; box-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .bg-green { background-color: #28a745; }
        .bg-yellow { background-color: #ffc107; color: black; }
        .bg-red { background-color: #dc3545; }

        /* --- DASHBOARD ITEMS --- */
        .dash-item { background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); border-left: 4px solid var(--swk-yellow); padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .dash-header { display: flex; justify-content: space-between; font-size: 12px; color: #ccc; margin-bottom: 10px; }
        .dash-actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-edit { background: #17a2b8; color: white; border: none; padding: 8px; border-radius: 5px; flex: 1; font-size: 12px; }
        .btn-delete { background: #dc3545; color: white; border: none; padding: 8px; border-radius: 5px; flex: 1; font-size: 12px; }

        /* --- BOTTOM NAV --- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px);
            display: grid; grid-template-columns: repeat(4, 1fr);
            padding: 10px 5px; border-top: 2px solid var(--swk-red); z-index: 1000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; background: none; border: none; color: #aaa; font-size: 9px; font-weight: 600; cursor: pointer; }
        .nav-item svg { width: 20px; height: 20px; margin-bottom: 4px; fill: currentColor; }
        .nav-item:active, .nav-item.active-nav { color: var(--swk-yellow); }

        .hidden { display: none !important; }
        footer { text-align: center; font-size: 11px; color: #666; padding: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="view-login" class="view glass-card">

            <label style="font-size: 12px; color: #ccc;">No. Kad Pengenalan:</label>
            <input type="number" id="guru-ic" placeholder="Cth: 80010113XXXX" inputmode="numeric">
            <button class="btn-sarawak" onclick="loginGuru()">Log Masuk</button>

        <div id="view-home" class="view hidden">
            <div class="glass-card">
                <h3 id="display-guru-name" style="color: var(--swk-yellow); margin-top:0;"></h3>

            </div>
        </div>

        <div id="view-live" class="view hidden">
            <div class="glass-card">
                <h3 style="text-align:center; color: var(--swk-yellow); margin-top:0;">SEMAK REKOD (MASTER)</h3>

            </div>
        </div>

        <footer>hakcipta NDJE@Selirik, Kapit 2026</footer>
    </div>

    <nav id="bottom-nav" class="bottom-nav hidden">
        <button class="nav-item" onclick="goBack()"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>Kembali</button>
        <button class="nav-item" onclick="simpanHantar()"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>Simpan & Hantar</button>

        <button class="nav-item" onclick="logout()"><svg viewBox="0 0 24 24"><path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.11 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>Keluar</button>

        };

        const csvLinks = {
            1: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQCbmoYUWEIQIYGLveu-q4TOsYjzT_1mq6w2-m_m0Q5e5G2Oy0G9dXVP3yxNHjY4qjZQ3LIKx9j2gvl/pub?gid=154786193&single=true&output=csv",
            2: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSi-4btpKwvSPukQGKHP0hKMHxxPfhbWgIcJGHdD2HjsvIjXuuFzAAuNL59R59sbMnocvfOv0KGuoNB/pub?output=csv",
            3: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRpl0emnND3D0WSm0n92Qj3rjVtI7L36FHOSZXhOBulRJslOGtD8yIgOw74hZfljlQ2HMwxf2jogl1-/pub?output=csv",
            4: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRoPGa6YjNCurNwaGTABEflsRqSactw6orXWR6w3AlIn-25LgczQxahCu7rPRVlnKbQWndUz0rdtKAy/pub?output=csv",

        };

        const gasLinks = {
            1: "https://script.google.com/macros/s/AKfycbwVty8RJYYJdwLmb1S6Sg7UesR6aahXE_Am-ByTtoLIFlh-a3hJLQxVOC-E6nTr8Sf0/exec",
            2: "https://script.google.com/macros/s/AKfycbzGWj0sANCpxr25wMoZa8kKUa1E2JXUoGIa2tG1eugzn9MtEG4iN2os-OI3ZOYHFoOt/exec",
            3: "https://script.google.com/macros/s/AKfycbzoQG8-Tzy2Juk--neVayxxNtFdAzkbZKQ31chWBzsQk2uFaVQC3CG90PEE_xP_-Oms/exec",
            4: "https://script.google.com/macros/s/AKfycbyMqEr4f3Yy1KRJLI5UrSWR6O5h1U1NfKsoN7mCocPLskF2qW49wklyM16CkbHg1u8GUw/exec",
            5: "https://script.google.com/macros/s/AKfycbyyvhvENF8bxMj2hrMKkq9ZJ1hZwuqfiQaNEqdzJw942sMPh5Hj1GmvYKBqvdzgVEfF/exec"
        };

        let currentGuru = null;
        let activeSubjek = "";
        let activeSesi = "";
        let currentTingkatan = 1;
        let attendanceRecord = {}; 
        let editModeId = null;

        function parseCSV(str) {
            const arr = []; let quote = false; let row = 0, col = 0, c = 0;
            for (let c = 0; c < str.length; c++) {
                let cc = str[c], nc = str[c+1];
                arr[row] = arr[row] || []; arr[row][col] = arr[row][col] || '';
                if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
                if (cc == '"') { quote = !quote; continue; }
                if (cc == ',' && !quote) { ++col; continue; }
                if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
                if (cc == '\n' && !quote) { ++row; col = 0; continue; }
                if (cc == '\r' && !quote) { ++row; col = 0; continue; }
                arr[row][col] += cc;
            }
            return arr;
        }

        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
            const nav = document.getElementById('bottom-nav');
            if (viewId === 'view-login') nav.classList.add('hidden');
            else nav.classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function loginGuru() {
            const ic = document.getElementById('guru-ic').value.trim();
            if (guruData[ic]) {
                currentGuru = guruData[ic];
                document.getElementById('display-guru-name').innerText = "Selamat Datang, Cikgu " + currentGuru.nama;
                
                const select = document.getElementById('select-subjek');
                select.innerHTML = "";
                currentGuru.subjek.forEach(s => {
                    select.innerHTML += `<option value="${s}">${s}</option>`;
                });
                
                renderLocalDashboard();
                switchView('view-home');
            } else { alert("ID tidak sah. Sila semak semula No Kad Pengenalan."); }
        }

        function getTingkatan(subjek) {
            const match = subjek.match(/\d+/);
            return match ? parseInt(match[0]) : 1;
        }

        async function bukaSenarai(isEdit = false, editData = null) {
            if(!isEdit) {
                activeSubjek = document.getElementById('select-subjek').value;
                activeSesi = document.getElementById('select-sesi').value;
                editModeId = null;
                attendanceRecord = {};
            } else {
                activeSubjek = editData.subjek;
                activeSesi = editData.sesi;
                editModeId = editData.id;
                attendanceRecord = JSON.parse(JSON.stringify(editData.records)); 
            }

            currentTingkatan = getTingkatan(activeSubjek);
            document.getElementById('display-info-kelas').innerHTML = `${activeSubjek}<br><span style="font-size:12px;color:#fff;">SESI ${activeSesi}</span>`;
            switchView('view-attendance');
            const container = document.getElementById('student-list-container');
            const loading = document.getElementById('loading-text');
            
            container.innerHTML = "";
            loading.style.display = "block";

            try {
                const response = await fetch(csvLinks[currentTingkatan]);
                const csvData = await response.text();
                const rows = parseCSV(csvData);
                
                const filtered = rows.filter(r => r[3] && r[3].trim().toUpperCase() === activeSubjek.toUpperCase());
                
                loading.style.display = "none";
                
                if(filtered.length === 0) {
                    container.innerHTML = "<p style='text-align:center;'>Tiada pelajar ditemui untuk subjek ini di dalam pangkalan data.</p>";
                    return;
                }

                filtered.forEach((p, index) => {
                    const nama = p[0].trim();
                    const kelas = p[1] ? p[1].trim() : "";
                    const jantina = p[2] ? p[2].trim() : "";
                    
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'student-row';
                    rowDiv.id = `row-${index}`;
                    
                    let activeG = "", activeY = "", activeR = "";
                    if(attendanceRecord[nama]) {
                        if(attendanceRecord[nama] === "Hadir") activeG = "active";
                        if(attendanceRecord[nama] === "TH Bersebab") activeY = "active";
                        if(attendanceRecord[nama] === "TH Tanpa Sebab") activeR = "active";
                    }

                    rowDiv.innerHTML = `
                        <span class="student-info">${index+1}. ${nama}</span>
                        <span class="student-meta">Kelas: ${kelas} | Jantina: ${jantina}</span>
                        <div class="att-btn-group" id="group-${index}">
                            <button class="att-btn bg-green ${activeG}" onclick="markAtt(${index}, '${nama.replace(/'/g,"\\'")}','Hadir')">HADIR</button>
                            <button class="att-btn bg-yellow ${activeY}" onclick="markAtt(${index}, '${nama.replace(/'/g,"\\'")}','TH Bersebab')">TH BERSEBAB</button>
                            <button class="att-btn bg-red ${activeR}" onclick="markAtt(${index}, '${nama.replace(/'/g,"\\'")}','TH Tanpa Sebab')">TH TANPA SEBAB</button>
                        </div>
                    `;
                    container.appendChild(rowDiv);
                });
            } catch (e) {
                loading.innerHTML = "Ralat menarik data dari Google Sheet.";
            }
        }

        function markAtt(idx, nama, status) {
            attendanceRecord[nama] = status;
            const group = document.getElementById(`group-${idx}`);
            group.querySelectorAll('.att-btn').forEach(b => b.classList.remove('active'));
            
            let searchStr = status === 'Hadir' ? 'HADIR' : (status === 'TH Bersebab' ? 'BERSEBAB' : 'TANPA SEBAB');
            const btn = Array.from(group.querySelectorAll('.att-btn')).find(b => b.innerText === searchStr);
            if(btn) btn.classList.add('active');
            
            const row = document.getElementById(`row-${idx}`);
            row.classList.add('highlight');
            setTimeout(() => row.classList.remove('highlight'), 300);

            const next = document.getElementById(`row-${idx+1}`);
            if(next) {
                setTimeout(() => next.scrollIntoView({behavior:'smooth', block:'center'}), 150);
            }
        }

        function saveToLocal() {
            let history = JSON.parse(localStorage.getItem('seep_attendance') || '[]');
            
            if(editModeId) {
                const index = history.findIndex(h => h.id === editModeId);
                if(index > -1) {
                    history[index].records = attendanceRecord;
                    history[index].date = new Date().toLocaleString();
                }
            } else {
                const newRecord = {
                    id: Date.now().toString(),
                    guruIC: document.getElementById('guru-ic').value,
                    subjek: activeSubjek,
                    sesi: activeSesi,
                    tingkatan: currentTingkatan,
                    date: new Date().toLocaleString(),
                    records: attendanceRecord
                };
                history.push(newRecord);
            }
            localStorage.setItem('seep_attendance', JSON.stringify(history));
            renderLocalDashboard();
        }

        async function postToSheet(recordDataObj, isDelete = false) {
            const url = gasLinks[recordDataObj.tingkatan];
            const kolumSesi = String.fromCharCode(64 + 4 + parseInt(recordDataObj.sesi)); 
            
            const promises = Object.keys(recordDataObj.records).map(nama => {
                const status = isDelete ? "" : recordDataObj.records[nama];
                const payload = new URLSearchParams({
                    'nama': nama,
                    'status': status,
                    'kolum': kolumSesi,
                    'subjek': recordDataObj.subjek
                });

                return fetch(url, { method: 'POST', mode: 'no-cors', body: payload });
            });

            await Promise.all(promises);
        }

        async function simpanHantar() {
            if(Object.keys(attendanceRecord).length === 0) {
                return alert("Sila tanda kehadiran terlebih dahulu.");
            }
            
            alert("Menyimpan dan menghantar data ke pelayan. Sila tunggu sebentar...");
            saveToLocal();
            
            let history = JSON.parse(localStorage.getItem('seep_attendance') || '[]');
            let targetRecord = history.find(h => h.subjek === activeSubjek && h.sesi === activeSesi);
            
            if(targetRecord) {
                try {
                    await postToSheet(targetRecord, false);
                    alert("Berjaya disimpan dan dihantar ke Google Sheet MASTER!");
                    goBack();
                } catch(e) {
                    alert("Disimpan ke LocalStorage tetapi ralat menghantar ke pelayan. Sila cuba hantar semula nanti.");
                }
            }
        }

        function renderLocalDashboard() {
            const list = document.getElementById('local-dashboard-list');
            const ic = document.getElementById('guru-ic').value;
            let history = JSON.parse(localStorage.getItem('seep_attendance') || '[]');
            
            history = history.filter(h => h.guruIC === ic).sort((a,b) => b.id - a.id);
            
            if(history.length === 0) {
                list.innerHTML = "<p style='font-size:12px; color:#aaa;'>Tiada rekod tersimpan.</p>";
                return;
            }

            list.innerHTML = "";
            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'dash-item';
                div.innerHTML = `
                    <div class="dash-header">
                        <strong>${item.subjek}</strong>
                        <span>SESI ${item.sesi}</span>
                    </div>
                    <div style="font-size:11px; color:#aaa; margin-bottom:10px;">Dikemaskini: ${item.date}</div>
                    <div style="font-size:12px;">Jumlah Direkod: ${Object.keys(item.records).length} pelajar</div>
                    <div class="dash-actions">
                        <button class="btn-edit" onclick="kemaskiniRekod('${item.id}')">Kemaskini</button>
                        <button class="btn-delete" onclick="hapusRekod('${item.id}')">Hapus</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function kemaskiniRekod(id) {
            let history = JSON.parse(localStorage.getItem('seep_attendance') || '[]');
            const record = history.find(h => h.id === id);
            if(record) {
                bukaSenarai(true, record);
            }
        }

        async function hapusRekod(id) {
            if(!confirm("Anda pasti mahu menghapus rekod ini dari telefon DAN Google Sheet?")) return;
            
            let history = JSON.parse(localStorage.getItem('seep_attendance') || '[]');
            const record = history.find(h => h.id === id);
            
            if(record) {
                alert("Sedang memadam data di pelayan...");
                try {
                    await postToSheet(record, true);
                    
                    history = history.filter(h => h.id !== id);
                    localStorage.setItem('seep_attendance', JSON.stringify(history));
                    renderLocalDashboard();
                    alert("Rekod berjaya dihapuskan.");
                } catch(e) {
                    alert("Ralat memadam di pelayan.");
                }
            }
        }

        async function viewLiveCheck() {
            activeSubjek = document.getElementById('select-subjek').value || activeSubjek;
            if(!activeSubjek) return alert("Sila log masuk dan pilih subjek dahulu.");
            
            currentTingkatan = getTingkatan(activeSubjek);
            switchView('view-live');
            
            const container = document.getElementById('live-check-content');
            container.innerHTML = "<p style='text-align:center;'>Menarik data langsung dari sheet...</p>";

            try {
                const response = await fetch(csvLinks[currentTingkatan]);
                const csvData = await response.text();
                const rows = parseCSV(csvData);
                
                const headers = rows[0];
                const filtered = rows.slice(1).filter(r => r[3] && r[3].trim().toUpperCase() === activeSubjek.toUpperCase());

                if(filtered.length === 0) {
                    container.innerHTML = "<p style='text-align:center;'>Tiada data dalam sheet MASTER.</p>";
                    return;
                }

                let html = `<h4 style='color:var(--swk-yellow); margin-bottom:5px;'>${activeSubjek}</h4>`;
                
                filtered.forEach(p => {
                    html += `<div style="background:rgba(255,255,255,0.05); padding:10px; margin-bottom:10px; border-radius:8px;">`;
                    html += `<div style="font-weight:bold; font-size:13px; margin-bottom:8px;">${p[0]}</div>`;
                    
                    let adaRekod = false;
                    for(let i=4; i<=21; i++) {
                        if(p[i] && p[i].trim() !== "") {
                            adaRekod = true;
                            let color = "#fff";
                            if(p[i]==='Hadir') color = "#28a745";
                            else if(p[i].includes('Bersebab')) color = "#ffc107";
                            else if(p[i].includes('Sebab')) color = "#dc3545";
                            
                            html += `<span style="display:inline-block; font-size:10px; padding:3px 6px; background:${color}; color:${color==='#ffc107'?'black':'white'}; border-radius:4px; margin-right:5px; margin-bottom:5px;">Sesi ${i-3}: ${p[i]}</span>`;
                        }
                    }
                    if(!adaRekod) html += `<span style="font-size:11px; color:#888;">Belum ada rekod kehadiran.</span>`;
                    html += `</div>`;
                });

                container.innerHTML = html;

            } catch(e) {
                container.innerHTML = "Gagal memuatkan data.";
            }
        }

        function goBack() {
            if(!document.getElementById('view-attendance').classList.contains('hidden') || !document.getElementById('view-live').classList.contains('hidden')) {
                renderLocalDashboard();
                switchView('view-home');
            }
        }

        function logout() {
            currentGuru = null;
            document.getElementById('guru-ic').value = "";
            switchView('view-login');
        }

    </script>
</body>
</html>
