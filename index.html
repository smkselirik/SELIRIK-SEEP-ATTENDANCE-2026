<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PORTAL KEHADIRAN SEEP 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --swk-yellow: #ffcd00;
            --swk-red: #e31b23;
            --swk-black: #000000;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --bg-dark: #0f1216;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Header Section - Diperbaharui dengan URL baharu dan saiz jelas */
        .main-header {
            width: 100%;
            height: 250px;
            background: url('https://i.ibb.co/k6mJ2r8F/header-website-seep-latest.jpg') no-repeat center center;
            background-size: cover;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom: 4px solid var(--swk-red);
        }

        .header-title {
            background: rgba(0, 0, 0, 0.65);
            padding: 10px 25px;
            text-align: center;
            backdrop-filter: blur(8px);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            margin-bottom: 20px;
        }

        .header-title h1 {
            margin: 0;
            font-size: 1.3rem;
            color: var(--swk-yellow);
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .logo-container {
            width: 110px;
            height: 110px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -55px;
            position: relative;
            z-index: 10;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }

        .logo-container img {
            width: 80px;
            height: auto;
        }

        /* Forms & Containers */
        .container {
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
            padding-bottom: 120px;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        input, select {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.4);
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }
        
        input:focus, select:focus {
            border-color: var(--swk-yellow);
        }

        /* Butang Bendera Sarawak Glassy */
        .btn-login {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--swk-red) 30%, var(--swk-yellow) 60%, var(--swk-black) 100%);
            color: white;
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 4px 15px rgba(227, 27, 35, 0.4);
            transition: 0.3s;
        }
        
        .btn-login:active {
            transform: scale(0.98);
        }

        /* Attendance Buttons */
        .att-btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }

        .att-btn {
            padding: 12px 2px;
            border: 1px solid transparent;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            opacity: 0.5;
        }

        .att-btn.active { 
            opacity: 1; 
            transform: scale(1.03); 
            border: 2px solid white; 
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        
        .bg-green { background-color: #28a745; }
        .bg-yellow { background-color: #ffc107; color: black; }
        .bg-red { background-color: #dc3545; }

        /* Student List */
        .student-row {
            padding: 15px 0;
            border-bottom: 1px solid var(--glass-border);
        }

        .student-row:last-child { border: none; }
        .student-name { font-weight: 600; font-size: 14px; margin-bottom: 5px; display: block; color: var(--swk-yellow); }
        .student-meta { font-size: 11px; opacity: 0.8; }

        /* Navigation Bottom Bar */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 18, 22, 0.98);
            backdrop-filter: blur(15px);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            padding: 12px 5px;
            border-top: 2px solid var(--swk-red);
            z-index: 1000;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: none;
            border: none;
            color: white;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-item svg { width: 22px; height: 22px; margin-bottom: 4px; fill: currentColor; }
        .nav-item:active, .nav-item:focus { color: var(--swk-yellow); outline: none; }

        /* Dashboard */
        .dashboard-item {
            background: rgba(255,255,255,0.08);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-size: 13px;
            border: 1px solid var(--glass-border);
        }

        .record-student-list {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed rgba(255,255,255,0.2);
        }

        .record-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            font-size: 11px;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 600;
        }

        .dash-btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .dash-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: 600;
            font-size: 11px;
            cursor: pointer;
        }
        .btn-edit { background: #007bff; }
        .btn-delete { background: #dc3545; }

        footer {
            text-align: center;
            font-size: 11px;
            color: #888;
            padding: 20px;
            margin-top: 20px;
        }

        .hidden { display: none !important; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .view { animation: fadeIn 0.4s ease-out; }

    </style>
</head>

        // --- DATABASE LINKS ---
        const csvLinks = {
            1: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQCbmoYUWEIQIYGLveu-q4TOsYjzT_1mq6w2-m_m0Q5e5G2Oy0G9dXVP3yxNHjY4qjZQ3LIKx9j2gvl/pub?gid=154786193&single=true&output=csv",

            9: "M", 10: "N", 11: "O", 12: "P", 13: "Q", 14: "R", 15: "S", 16: "T", 17: "U", 18: "V"

        // --- APP STATE ---
        let currentGuru = null;
        let activeSubjek = "";
        let activeSesi = "";
        let currentTingkatan = 0;
        let attendanceRecord = {};

        // --- LOGIC ---

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
            
            if (viewId === 'view-login') {
                document.getElementById('bottom-nav').classList.add('hidden');
            } else {
                document.getElementById('bottom-nav').classList.remove('hidden');
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function loginGuru() {
            const ic = document.getElementById('guru-ic').value;
            if (guruData[ic]) {
                currentGuru = guruData[ic];
                document.getElementById('display-guru-name').innerText = "Selamat Datang, " + currentGuru.nama;
                
                const select = document.getElementById('select-subjek');
                select.innerHTML = "";
                currentGuru.subjek.forEach(s => {
                    let opt = document.createElement('option');
                    opt.value = s;
                    opt.innerText = s;
                    select.appendChild(opt);
                });

                showView('view-selection');
            } else {
                alert("ID Guru tidak dijumpai. Sila pastikan Nombor Kad Pengenalan adalah betul tanpa tanda sengkang (-).");
            }
        }

        // Feature "Enter" untuk login
        document.getElementById("guru-ic").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                loginGuru();
            }
        });

        async function loadPelajar() {
            activeSubjek = document.getElementById('select-subjek').value;
            activeSesi = document.getElementById('select-sesi').value;
            
            // Cari tingkatan dari nama subjek
            const match = activeSubjek.match(/\d+/);
            currentTingkatan = match ? parseInt(match[0]) : 1;

            document.getElementById('display-info-kelas').innerText = `${activeSubjek} - SESI ${activeSesi}`;
            
            const container = document.getElementById('student-list-container');
            container.innerHTML = "<p style='text-align:center'>Memuatkan senarai pelajar...</p>";
            
            try {
                const response = await fetch(csvLinks[currentTingkatan]);
                const data = await response.text();
                const rows = data.split('\n').map(row => row.split(','));
                
                // Rows: 0=Nama, 1=Kelas, 2=Jantina, 3=Subjek/Kumpul
                const filtered = rows.filter(row => row[3] && row[3].trim().toUpperCase() === activeSubjek.toUpperCase());

                if (filtered.length === 0) {
                    container.innerHTML = "<p style='text-align:center; color:#ffcc00;'>Tiada pelajar dijumpai untuk kelas dan subjek ini di dalam helaian MASTER.</p>";
                    showView('view-attendance');
                    return;
                }

                container.innerHTML = "";
                
                // Preserve existing attendance if editing
                const existingRecordID = localStorage.getItem('editing_record_id');
                if(existingRecordID) {
                    const localData = JSON.parse(localStorage.getItem('seep_records') || "[]");
                    const item = localData.find(d => d.id == existingRecordID);
                    if(item) attendanceRecord = item.rekod;
                } else {
                    attendanceRecord = {};
                }

                filtered.forEach((p, index) => {
                    const nama = p[0].trim();
                    const kelas = p[1].trim();
                    const jantina = p[2].trim();
                    
                    const statusSemasa = attendanceRecord[nama] || '';
                    
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'student-row';
                    rowDiv.id = `row-${index}`;
                    rowDiv.innerHTML = `
                        <span class="student-name">${index + 1}. ${nama}</span>
                        <span class="student-meta">Kelas: ${kelas} | Jantina: ${jantina}</span>
                        <div class="att-btn-group" id="group-${index}">
                            <button class="att-btn bg-green ${statusSemasa === 'Hadir' ? 'active' : ''}" onclick="markAttendance(${index}, '${nama.replace(/'/g, "\\'")}', 'Hadir')">HADIR</button>
                            <button class="att-btn bg-yellow ${statusSemasa === 'TH Bersebab' ? 'active' : ''}" onclick="markAttendance(${index}, '${nama.replace(/'/g, "\\'")}', 'TH Bersebab')">BERSEBAB</button>
                            <button class="att-btn bg-red ${statusSemasa === 'TH Tanpa Sebab' ? 'active' : ''}" onclick="markAttendance(${index}, '${nama.replace(/'/g, "\\'")}', 'TH Tanpa Sebab')">TANPA SEBAB</button>
                        </div>
                    `;
                    container.appendChild(rowDiv);
                });

                showView('view-attendance');

            } catch (err) {
                alert("Gagal memuatkan data pelajar dari pangkalan data: " + err);
            }
        }

        function markAttendance(idx, nama, status) {
            attendanceRecord[nama] = status;
            
            // Update UI
            const btnGroup = document.getElementById(`group-${idx}`);
            btnGroup.querySelectorAll('.att-btn').forEach(btn => btn.classList.remove('active'));
            
            const selectedBtn = Array.from(btnGroup.querySelectorAll('.att-btn')).find(b => b.innerText.includes(status.toUpperCase().replace('TH ', '')));
            if(selectedBtn) selectedBtn.classList.add('active');

            // Auto-focus / Lompat ke pelajar seterusnya (meniru fungsi Enter)
            const nextRow = document.getElementById(`row-${idx + 1}`);
            if (nextRow) {
                // Beri sedikit delay untuk nampak animasi button dtekan sebelum scroll
                setTimeout(() => {
                    nextRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 150);
            }
        }

        function simpanHantar() {
            if (document.getElementById('view-attendance').classList.contains('hidden')) {
                alert("Sila buka senarai kehadiran terlebih dahulu.");
                return;
            }

            const listPelajar = Object.keys(attendanceRecord);
            if (listPelajar.length === 0) {
                alert("Sila tandakan sekurang-kurangnya satu kehadiran pelajar sebelum menyimpan.");
                return;
            }

            const tarikh = new Date().toLocaleDateString('ms-MY') + " " + new Date().toLocaleTimeString('ms-MY', { hour: '2-digit', minute: '2-digit' });
            
            // Semak adakah kita sedang mengemaskini (edit) rekod lama
            const editingID = localStorage.getItem('editing_record_id');
            const dataUntukSimpan = {
                id: editingID ? parseInt(editingID) : Date.now(),
                guru: currentGuru.nama,
                subjek: activeSubjek,
                sesi: activeSesi,
                tingkatan: currentTingkatan,
                tarikh: tarikh,
                rekod: attendanceRecord
            };

            // 1. Simpan ke LocalStorage
            let localData = JSON.parse(localStorage.getItem('seep_records') || "[]");
            if(editingID) {
                localData = localData.filter(d => d.id != editingID); // Buang yang lama, ganti yang baru
                localStorage.removeItem('editing_record_id');
            }
            localData.push(dataUntukSimpan);
            localStorage.setItem('seep_records', JSON.stringify(localData));

            // 2. Hantar ke Google Sheet MASTER
            const url = gasLinks[currentTingkatan];
            const kolum = sesiKolum[activeSesi];

            alert("Memproses simpanan ke storan tempatan dan menghantar ke Google Sheet...");

            // POST ke GAS
            Promise.all(listPelajar.map(nama => {
                return fetch(url, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        'nama': nama,
                        'status': attendanceRecord[nama],
                        'kolum': kolum,
                        'subjek': activeSubjek
                    })
                });
            })).then(() => {
                alert("Berjaya disimpan dan direkodkan ke Google Sheet!");
                viewDashboard();
            }).catch(e => {
                alert("Terdapat ralat semasa menghantar ke server, tetapi data telah disimpan di dalam telefon anda.");
                viewDashboard();
            });
        }

        function viewDashboard() {
            showView('view-dashboard');
            const list = document.getElementById('dashboard-list');
            const localData = JSON.parse(localStorage.getItem('seep_records') || "[]");

            // Hanya tunjuk rekod guru yang sedang login
            const rekodGuru = localData.filter(d => d.guru === currentGuru.nama);

            if (rekodGuru.length === 0) {
                list.innerHTML = "<div class='glass-card' style='text-align:center;'>Tiada rekod kehadiran dijumpai untuk anda di dalam storan ini.</div>";
                return;
            }

            list.innerHTML = "";
            rekodGuru.sort((a,b) => b.id - a.id).forEach(item => {
                const div = document.createElement('div');
                div.className = 'dashboard-item';
                
                // Bina jadual pelajar untuk rekod ini
                let senaraiPelajarHTML = `<div class="record-student-list">`;
                for (const [nama, status] of Object.entries(item.rekod)) {
                    let badgeClass = status === 'Hadir' ? 'bg-green' : status === 'TH Bersebab' ? 'bg-yellow' : 'bg-red';
                    senaraiPelajarHTML += `
                        <div class="record-row">
                            <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-right:10px;">${nama}</span>
                            <span class="status-badge ${badgeClass}">${status}</span>
                        </div>
                    `;
                }
                senaraiPelajarHTML += `</div>`;

                div.innerHTML = `
                    <div style="font-weight: 600; font-size: 14px; color: var(--swk-yellow);">${item.subjek}</div>
                    <div style="margin-bottom: 5px;">Sesi: <span style="font-weight:bold;">${item.sesi}</span> | Tarikh: ${item.tarikh}</div>
                    ${senaraiPelajarHTML}
                    <div class="dash-btn-group">
                        <button class="dash-btn btn-delete" onclick="hapusRekod(${item.id})">HAPUS</button>
                        <button class="dash-btn btn-edit" onclick="editRekod(${item.id})">KEMASKINI</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function hapusRekod(id) {
            if (!confirm("Adakah anda pasti mahu memadam rekod ini dari storan tempatan dan di pangkalan data Google Sheet MASTER?")) return;
            
            let localData = JSON.parse(localStorage.getItem('seep_records') || "[]");
            const item = localData.find(d => d.id === id);
            
            if (item) {
                // Hantar request 'Hapus' ke GAS dengan menghantar string kosong
                const url = gasLinks[item.tingkatan];
                const kolum = sesiKolum[item.sesi];
                
                Object.keys(item.rekod).forEach(nama => {
                    fetch(url, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: new URLSearchParams({
                            'nama': nama,
                            'status': '', 
                            'kolum': kolum,
                            'subjek': item.subjek
                        })
                    });
                });
            }

            localData = localData.filter(d => d.id !== id);
            localStorage.setItem('seep_records', JSON.stringify(localData));
            viewDashboard();
            alert("Rekod berjaya dipadam!");
        }

        function editRekod(id) {
            const localData = JSON.parse(localStorage.getItem('seep_records') || "[]");
            const item = localData.find(d => d.id === id);
            if (item) {
                // Set the selection fields to match the record
                activeSubjek = item.subjek;
                activeSesi = item.sesi;
                currentTingkatan = item.tingkatan;
                
                document.getElementById('select-subjek').value = activeSubjek;
                document.getElementById('select-sesi').value = activeSesi;
                
                // Set special flag in localstorage so saving overwrites this entry
                localStorage.setItem('editing_record_id', id);
                
                loadPelajar();
            }
        }

        function goBack() {
            localStorage.removeItem('editing_record_id'); // Clear flag just in case
            
            if (!document.getElementById('view-attendance').classList.contains('hidden')) {
                showView('view-selection');
            } else if (!document.getElementById('view-dashboard').classList.contains('hidden')) {
                showView('view-selection');
            } else {
                showView('view-login');
            }
        }

        function logout() {
            if(confirm("Adakah anda pasti mahu keluar? Data yang disimpan di Local Store tidak akan hilang.")) {
                currentGuru = null;
                attendanceRecord = {};
                document.getElementById('guru-ic').value = '';
                localStorage.removeItem('editing_record_id');
                showView('view-login');
            }
        }

    </script>
</body>
</html>
