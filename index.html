<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTAL KEHADIRAN SEEP 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --swk-yellow: #ffcd00;
            --swk-red: #e31b23;
            --swk-black: #000000;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header Section */
        header {
            width: 100%;
            position: relative;
        }

        .header-banner {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }

        .logo-placard {
            width: 100px;
            height: 100px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: -50px auto 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            position: relative;
            z-index: 2;
        }

        .logo-placard img {
            width: 70%;
        }

        .title-area {
            text-align: center;
            padding: 10px;
        }

        .title-area h1 {
            font-size: 1.4rem;
            margin: 0;
            color: var(--swk-yellow);
            text-shadow: 2px 2px 4px #000;
        }

        .title-area p {
            margin: 5px 0;
            font-size: 1rem;
            letter-spacing: 2px;
        }

        /* Container & Glass Card */
        .container {
            flex: 1;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            width: 90%;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.37);
            margin-bottom: 100px;
        }

        /* Inputs & Buttons */
        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            color: #fff;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .btn-login {
            background: linear-gradient(45deg, var(--swk-red), var(--swk-yellow));
            color: #000;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(227, 27, 35, 0.4);
            text-transform: uppercase;
        }

        .btn-login:hover {
            transform: scale(1.02);
            filter: brightness(1.2);
        }

        /* Attendance List */
        .student-item {
            padding: 15px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .student-info {
            font-size: 0.9rem;
        }

        .att-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 5px;
        }

        .att-btn {
            padding: 10px 5px;
            border: none;
            border-radius: 8px;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: 600;
            color: #fff;
            text-align: center;
        }

        .btn-hadir { background: #28a745; }
        .btn-sebab { background: #ffc107; color: #000; }
        .btn-tanpasebab { background: #dc3545; }

        .active-selection {
            border: 2px solid #fff !important;
            transform: scale(1.05);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.9);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            padding: 10px 0;
            border-top: 1px solid var(--swk-red);
            z-index: 100;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 0.7rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .nav-btn i { font-size: 1.2rem; margin-bottom: 2px; }
        .nav-btn:hover { color: var(--swk-yellow); }

        /* Dashboard Styles */
        .record-card {
            background: rgba(255,255,255,0.05);
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.8rem;
        }

        .footer {
            text-align: center;
            font-size: 0.7rem;
            padding: 20px;
            opacity: 0.6;
        }

        /* Utility */
        .hidden { display: none; }
        .loader { text-align: center; padding: 20px; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header>
    <img src="https://i.ibb.co/VpC03Qkn/IMG-8705.png" alt="Header" class="header-banner">
    <div class="logo-placard">
        <img src="https://i.ibb.co/VYSKMXf1/Logo-Selirik.png" alt="Logo">
    </div>
    <div class="title-area">
        <h1>PORTAL KEHADIRAN SEEP</h1>
        <p>2026</p>
    </div>
</header>

<div class="container">
    <div id="view-login" class="glass-card">
        <h3 style="text-align: center;">Log Masuk Guru</h3>
        <input type="number" id="input-ic" placeholder="Masukkan No. Kad Pengenalan">
        <button class="btn-login input" style="width: 100%; padding: 15px; margin-top: 10px;" onclick="handleLogin()">Masuk</button>
    </div>

    <div id="view-setup" class="glass-card hidden">
        <h3 id="welcome-msg">Selamat Datang</h3>
        <label>Pilih Subjek & Kelas</label>
        <select id="select-subject"></select>
        
        <label>Pilih Sesi</label>
        <select id="select-session">
            <option value="1">SESI 1</option><option value="2">SESI 2</option>
            <option value="3">SESI 3</option><option value="4">SESI 4</option>
            <option value="5">SESI 5</option><option value="6">SESI 6</option>
            <option value="7">SESI 7</option><option value="8">SESI 8</option>
            <option value="9">SESI 9</option><option value="10">SESI 10</option>
            <option value="11">SESI 11</option><option value="12">SESI 12</option>
            <option value="13">SESI 13</option><option value="14">SESI 14</option>

        <button class="btn-login" style="width: 100%; padding: 12px;" onclick="loadAttendanceList()">Buka Senarai Nama</button>
    </div>

    <div id="view-attendance" class="glass-card hidden">
        <h3 id="display-class-title">Senarai Pelajar</h3>
        <div id="loader" class="loader hidden"><i class="fas fa-spinner fa-spin"></i> Memuatkan data...</div>
        <div id="student-container"></div>
    </div>

    <div id="view-dashboard" class="glass-card hidden">
        <h3>Semakan Rekod (Local)</h3>
        <div id="dashboard-container"></div>
    </div>
</div>

<div class="footer">hakcipta NDJE@Selirik, Kapit 2026</div>

<nav id="main-nav" class="bottom-nav hidden">
    <button class="nav-btn" onclick="navigateBack()"><i class="fas fa-arrow-left"></i>Kembali</button>
    <button class="nav-btn" onclick="saveAndSubmit()"><i class="fas fa-save"></i>Simpan & Hantar</button>
    <button class="nav-btn" onclick="openDashboard()"><i class="fas fa-history"></i>Semak Rekod</button>
    <button class="nav-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i>Keluar</button>
</nav>

<script>
    // --- Data Guru ---
    const teachers = {

        "980605135925": { name: "JACKSON LEO ANAK SEBA", subjects: ["SEJARAH 5 SAPPHIRE"] },
        "990427135576": { name: "LORRAINNA SIERRA ANAK MEGONG", subjects: ["ENGLISH 3 AMETHYST"] },
        "950905036147": { name: "MUHAMMAD HANIF IQWAN BIN ABD AZIZ", subjects: ["MATEMATIK 3 DIAMOND", "MATEMATIK 4 AMETHYST"] },
        "960408135290": { name: "NURSYAMIERA BINTI MAJAIE", subjects: ["MATEMATIK 3 RUBY", "MATEMATIK 4 RUBY"] },
        "930403135198": { name: "NURUL SAMIZA BT ABANG", subjects: ["MATEMATIK 4 DIAMOND", "MATEMATIK 5 EMERALD"] },
        "940318135694": { name: "SIA KANG YEE", subjects: ["CHEMISTRY 4 JADEITE", "CHEMISTRY 5 JADEITE"] },
        "960830125354": { name: "SITI NOR LIYANA BINTI MOHD TASRIB", subjects: ["SAINS 3 DIAMOND"] },
        "910306135868": { name: "STEPHANIE ANAK JUKY", subjects: ["BIOLOGY 5 JADEITE", "SAINS 5 RUBY"] },
        "730417055045": { name: "WONG CHEE LOONG", subjects: ["ADDITIONAL MATHEMATICS 5 JADEITE", "MATEMATIK 5 RUBY"] },
        "790603135182": { name: "CATHERINE TING LEH MEE", subjects: ["SAINS 1 AMETHYST"] },
        "900217135285": { name: "AUDIE PETER ANAK JOACHIM", subjects: ["ENGLISH 1 AMETHYST", "ENGLISH 2 DIAMOND"] },
        "960820126054": { name: "BELLA ALFEYANA BOBBY", subjects: ["ENGLISH 2 RUBY"] },
        "960707136410": { name: "CHRISTINA GADING ANAK MERING", subjects: ["ENGLISH 1 DIAMOND"] },
        "921011135725": { name: "FRANKLIN ANAK BALA", subjects: ["SAINS 2 AMETHYST"] },
        "961202135572": { name: "MATEMATIK 1 DIAMOND", subjects: ["MATEMATIK 2 RUBY"] },
        "940129136671": { name: "MOHD FARIDH REZZA BIN MOHD SABLI", subjects: ["BAHASA INGGERIS 2 AMETHYST"] },
        "940708126945": { name: "MOHD. JAIEROL BIN JUMIN", subjects: ["MATEMATIK 1 RUBY", "MATEMATIK 2 AMETHYST"] },
        "861027526673": { name: "NELSON ANAK GEORGE", subjects: ["SAINS 2 DIAMOND"] },
        "990507135656": { name: "NORSYAZWANI BINT SALAINI", subjects: ["SAINS 1 DIAMOND"] },
        "971103085054": { name: "NUR ATHIRAH BINTI MD NOR", subjects: ["MATEMATIK 4 AMETHYST"] },
        "970927036787": { name: "MUHAMMAD BADRUL AMIN BIN AHMAD FUAD", subjects: ["MATEMATIK 1 AMETHYST"] },
        "00072130268": { name: "NUR ELLYSHA BINTI NUR MUSWARIE", subjects: ["SAINS 1 RUBY", "SAINS 2 RUBY"] },
        "910204135752": { name: "THANNIE BINTI BETTY", subjects: ["MATEMATIK 2 DIAMOND"] },
        "000627130838": { name: "VANESSA ANAK PUTEH", subjects: ["ENGLISH 1 RUBY"] }
    };

    // --- Configuration ---
    const csvSources = {
        "1": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQCbmoYUWEIQIYGLveu-q4TOsYjzT_1mq6w2-m_m0Q5e5G2Oy0G9dXVP3yxNHjY4qjZQ3LIKx9j2gvl/pub?gid=154786193&single=true&output=csv",
        "2": "https://docs.google.com/spreadsheets/d/e/2PACX-1vSi-4btpKwvSPukQGKHP0hKMHxxPfhbWgIcJGHdD2HjsvIjXuuFzAAuNL59R59sbMnocvfOv0KGuoNB/pub?output=csv",
        "3": "https://docs.google.com/spreadsheets/d/e/2PACX-1vRpl0emnND3D0WSm0n92Qj3rjVtI7L36FHOSZXhOBulRJslOGtD8yIgOw74hZfljlQ2HMwxf2jogl1-/pub?output=csv",
        "4": "https://docs.google.com/spreadsheets/d/e/2PACX-1vRoPGa6YjNCurNwaGTABEflsRqSactw6orXWR6w3AlIn-25LgczQxahCu7rPRVlnKbQWndUz0rdtKAy/pub?output=csv",
        "5": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQPx_Vym9O7mQejaGpkZjLEeTtu5sGxB36NRnPhc88YPAA0JyW64m5gg8XdEPi67QQul-jkUpv-Vczj/pub?output=csv"
    };

    const gasEndpoints = {
        "1": "https://script.google.com/macros/s/AKfycbwltfX7rBOSowNuAjqGqfAE19wewRE9rSg7Xe0Jdf_fAsrlMKEmHpBCVD01xO-fV-nE/exec",
        "2": "https://script.google.com/macros/s/AKfycbzHFtf4FgmUrtg4NNCi0libpnhOHCk2TnBI-RX_dvNb8fu7jkXoVgVrjSwcrpoFylvK/exec",
        "3": "https://script.google.com/macros/s/AKfycbxbJSaw6tWZjnCGSexUBp2X_yCYAu-sCpoDe1aGcqDJ13w9NOJvD4ac6f18SWlARWkh/exec",
        "4": "https://script.google.com/macros/s/AKfycbwUlfU0Sv7N20kANe05v3l1LF8I2fgGkF0RHpakDfFFcY_rug3lu1ay5OArSsMElmivQg/exec",
        "5": "https://script.google.com/macros/s/AKfycbxtRvCTS_E2VaOqSC3Ay0EUB201PP3GX_KY66CLNk4FHV1ACPvbEcCtXAj5nNgNMxZf/exec"
    };

    const sessionColMap = {
        "1": "E", "2": "F", "3": "G", "4": "H", "5": "I", "6": "J", "7": "K", "8": "L",
        "9": "M", "10": "N", "11": "O", "12": "P", "13": "Q", "14": "R", "15": "S", "16": "T",
        "17": "U", "18": "V"
    };

    // --- State Management ---
    let currentGuru = null;
    let attendanceData = [];
    let currentTingkatan = "";
    let currentSubject = "";
    let currentSession = "";

    // --- UI Logic ---
    function handleLogin() {
        const ic = document.getElementById('input-ic').value;
        if (teachers[ic]) {
            currentGuru = teachers[ic];
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-setup').classList.remove('hidden');
            document.getElementById('main-nav').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = `Selamat Datang, ${currentGuru.name}`;
            
            const subjectSelect = document.getElementById('select-subject');
            subjectSelect.innerHTML = "";
            currentGuru.subjects.forEach(sub => {
                let opt = document.createElement('option');
                opt.value = sub;
                opt.innerText = sub;
                subjectSelect.appendChild(opt);
            });
        } else {
            alert("No. IC tidak didaftarkan!");
        }
    }

    async function loadAttendanceList() {
        currentSubject = document.getElementById('select-subject').value;
        currentSession = document.getElementById('select-session').value;
        currentTingkatan = currentSubject.match(/\d+/)[0]; // Extract "3" from "MATEMATIK 3 AMETHYST"

        document.getElementById('view-setup').classList.add('hidden');
        document.getElementById('view-attendance').classList.remove('hidden');
        document.getElementById('display-class-title').innerText = `${currentSubject} - SESI ${currentSession}`;
        
        const loader = document.getElementById('loader');
        const container = document.getElementById('student-container');
        
        loader.classList.remove('hidden');
        container.innerHTML = "";

        try {
            const response = await fetch(csvSources[currentTingkatan]);
            const text = await response.text();
            const rows = text.split('\n').slice(1); // Remove header

            attendanceData = [];
            let html = "";

            rows.forEach((row, index) => {
                const cols = row.split(',');
                if (cols.length < 4) return;

                const name = cols[0].trim();
                const kelas = cols[1].trim();
                const jantina = cols[2].trim();
                const group = cols[3].trim();

                // FILTER: Only show students matching the Subject Group in Column D
                if (group.toUpperCase() === currentSubject.toUpperCase()) {
                    attendanceData.push({ name, status: "" });
                    html += `
                        <div class="student-item" id="student-row-${index}">
                            <div class="student-info">
                                <strong>${name}</strong><br>
                                <small>${kelas} | ${jantina}</small>
                            </div>
                            <div class="att-buttons">
                                <button class="att-btn btn-hadir" onclick="mark('${name}', 'Hadir', this, ${index})">Hadir</button>
                                <button class="att-btn btn-sebab" onclick="mark('${name}', 'Tidak Hadir Bersebab', this, ${index})">Sebab</button>
                                <button class="att-btn btn-tanpasebab" onclick="mark('${name}', 'Tidak Hadir Tanpa Sebab', this, ${index})">Tanpa Sebab</button>
                            </div>
                        </div>
                    `;
                }
            });

            container.innerHTML = html || "<p style='text-align:center'>Tiada pelajar dijumpai.</p>";
        } catch (e) {
            alert("Gagal memuatkan data pelajar.");
        } finally {
            loader.classList.add('hidden');
        }
    }

    function mark(name, status, btn, rowIndex) {
        // Update Internal Data
        const student = attendanceData.find(s => s.name === name);
        if (student) student.status = status;

        // UI Feedback
        const row = btn.parentElement;
        row.querySelectorAll('.att-btn').forEach(b => b.classList.remove('active-selection'));
        btn.classList.add('active-selection');

        // Feature: Auto jump to next student
        const nextRow = document.getElementById(`student-row-${rowIndex + 1}`);
        if (nextRow) {
            nextRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }

    function saveAndSubmit() {
        if (attendanceData.length === 0) return alert("Tiada data untuk dihantar.");
        
        const timestamp = new Date().toLocaleString();
        const recordKey = `SEEP_${Date.now()}`;
        const record = {
            id: recordKey,
            subject: currentSubject,
            session: currentSession,
            tingkatan: currentTingkatan,
            time: timestamp,
            data: attendanceData
        };

        // 1. Save to LocalStore
        let history = JSON.parse(localStorage.getItem('seep_records') || "[]");
        history.push(record);
        localStorage.setItem('seep_records', JSON.stringify(history));

        // 2. Submit to Google Sheets (GAS)
        const endpoint = gasEndpoints[currentTingkatan];
        const column = sessionColMap[currentSession];

        alert("Menghantar data ke Master Sheet. Sila tunggu...");

        // Note: Actual submission via Fetch to GAS (CORS might apply)
        attendanceData.forEach(s => {
            if(s.status === "") return;
            
            const formData = new URLSearchParams();
            formData.append('nama', s.name);
            formData.append('status', s.status);
            formData.append('kolum', column);
            formData.append('subject', currentSubject);

            fetch(endpoint, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            });
        });

        alert("Berjaya disimpan secara Local & Hantar!");
        openDashboard();
    }

    function openDashboard() {
        hideAllViews();
        document.getElementById('view-dashboard').classList.remove('hidden');
        const container = document.getElementById('dashboard-container');
        const history = JSON.parse(localStorage.getItem('seep_records') || "[]").reverse();

        if (history.length === 0) {
            container.innerHTML = "<p>Tiada rekod dijumpai.</p>";
            return;
        }

        container.innerHTML = history.map(rec => `
            <div class="record-card" id="rec-${rec.id}">
                <strong>${rec.subject} (Sesi ${rec.session})</strong><br>
                <small>${rec.time}</small>
                <div style="margin-top:5px; border-top:1px solid #444; padding-top:5px;">
                    Pelajar: ${rec.data.filter(d => d.status).length} / ${rec.data.length} ditanda.
                </div>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button onclick="updateRecord('${rec.id}')" style="background:#007bff; border:none; color:#fff; padding:5px 10px; border-radius:5px;">Kemaskini</button>
                    <button onclick="deleteRecord('${rec.id}')" style="background:#dc3545; border:none; color:#fff; padding:5px 10px; border-radius:5px;">Hapus</button>
                </div>
            </div>
        `).join("");
    }

    function deleteRecord(id) {
        if (!confirm("Hapus rekod ini dari local dan MASTER?")) return;
        
        let history = JSON.parse(localStorage.getItem('seep_records') || "[]");
        const record = history.find(r => r.id === id);
        
        if (record) {
            // Hantar request 'Hapus' (Set Empty) ke GAS
            const endpoint = gasEndpoints[record.tingkatan];
            const column = sessionColMap[record.session];

            record.data.forEach(s => {
                const formData = new URLSearchParams();
                formData.append('nama', s.name);
                formData.append('status', ""); // Clear status
                formData.append('kolum', column);
                formData.append('subject', record.subject);

                fetch(endpoint, { method: 'POST', mode: 'no-cors', body: formData });
            });

            // Update Local
            history = history.filter(r => r.id !== id);
            localStorage.setItem('seep_records', JSON.stringify(history));
            openDashboard();
            alert("Rekod dihapuskan.");
        }
    }

    function updateRecord(id) {
        // Simple logic: Load the record back to attendance view
        let history = JSON.parse(localStorage.getItem('seep_records') || "[]");
        const record = history.find(r => r.id === id);
        if (record) {
            currentSubject = record.subject;
            currentSession = record.session;
            currentTingkatan = record.tingkatan;
            attendanceData = record.data;
            
            document.getElementById('display-class-title').innerText = `${currentSubject} (Update Mode)`;
            hideAllViews();
            document.getElementById('view-attendance').classList.remove('hidden');
            
            // Re-render student items
            let html = "";
            attendanceData.forEach((s, index) => {
                html += `
                    <div class="student-item" id="student-row-${index}">
                        <div class="student-info"><strong>${s.name}</strong></div>
                        <div class="att-buttons">
                            <button class="att-btn btn-hadir ${s.status === 'Hadir' ? 'active-selection' : ''}" onclick="mark('${s.name}', 'Hadir', this, ${index})">Hadir</button>
                            <button class="att-btn btn-sebab ${s.status === 'Tidak Hadir Bersebab' ? 'active-selection' : ''}" onclick="mark('${s.name}', 'Tidak Hadir Bersebab', this, ${index})">Sebab</button>
                            <button class="att-btn btn-tanpasebab ${s.status === 'Tidak Hadir Tanpa Sebab' ? 'active-selection' : ''}" onclick="mark('${s.name}', 'Tidak Hadir Tanpa Sebab', this, ${index})">Tanpa Sebab</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('student-container').innerHTML = html;
        }
    }

    // --- Helpers ---
    function hideAllViews() {
        ['view-login', 'view-setup', 'view-attendance', 'view-dashboard'].forEach(id => {
            document.getElementById(id).classList.add('hidden');
        });
    }

    function navigateBack() {
        if (!document.getElementById('view-attendance').classList.contains('hidden')) {
            hideAllViews();
            document.getElementById('view-setup').classList.remove('hidden');
        } else if (!document.getElementById('view-dashboard').classList.contains('hidden')) {
            hideAllViews();
            document.getElementById('view-setup').classList.remove('hidden');
        }
    }

    function logout() {
        if(confirm("Keluar dari sistem? Rekod local akan disimpan.")){
            location.reload();
        }
    }

    function navigateTo(viewId) {
        hideAllViews();
        document.getElementById(viewId).classList.remove('hidden');
    }
</script>

</body>
</html>
